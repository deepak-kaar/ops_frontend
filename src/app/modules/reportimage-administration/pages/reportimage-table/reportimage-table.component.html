<div class="pt-[20px] px-[20px] md:pt-[50px]">
  <!-- <div class="flex gap-[20px] cursor-pointer"> -->
  <div class="flex flex-nowrap overflow-x-auto  gap-[20px] cursor-pointer md:flex-wrap md:overflow-visible">
    <p-card styleClass="w-[220px] border-b-4 border-b-[var(--p-primary-color)]">
      <div class="flex gap-[16px] h-full items-center font-bold">
        <div [innerHTML]="sanitizer.bypassSecurityTrustHtml(countCard.svg)"></div>
        <span>{{countCard.name}} : {{
          (file_data$ | async)?.length || 0
          }}</span>
      </div>
    </p-card>
  </div>
</div>
<div class="pt-[40px] pl-[20px] pr-[20px] w-full">
  <div class="flex justify-end pb-[10px] gap-[10px]">
    <p-button (click)="triggerImport()" icon="pi pi-file-import" label="Import Excel" pTooltip="Import from Excel"
      severity="secondary" class="w-full sm:w-auto"></p-button>
    <p-button (click)="exportExcel()" icon="pi pi-file-excel" label="Export Excel" pTooltip="Export to Excel"
      class="w-full sm:w-auto"></p-button>
    <p-button (onClick)="upload()">Upload</p-button>
  </div>
  <p-card class="w-full">
    <div class="card">
      <div class="flex flex-col md:flex-row md:justify-between gap-3 mb-4">
        <div class="flex justify-between items-center md:block">
          <div>List of Attachments</div>
          <div class="block md:hidden">
            <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clearTable(dt)" class="sm:w-auto" />
          </div>
        </div>

        <div class="flex flex-col sm:flex-row md:items-center md:justify-end gap-2 w-full md:w-auto">
          <div class="hidden md:block">
            <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clearTable(dt)" class="sm:w-auto" />
          </div>
          <div class="w-full sm:w-auto">
            <p-iconField iconPosition="left" class="w-full sm:w-auto">
              <p-inputIcon>
                <i class="pi pi-search"></i>
              </p-inputIcon>
              <input pInputText type="text" [(ngModel)]="searchValue" (input)="onGlobalFilter($event)"
                placeholder="Search" class="w-full" />
            </p-iconField>
          </div>
        </div>
      </div>

      <div class="table-wrapper">
        <p-table class="customizePaginator" #dt [value]="file_data$ | async" selectionMode="multiple"
          [(selection)]="selectedFiles" dataKey="_id" [rowHover]="true" [rows]="20"
          [showCurrentPageReport]="(isMobile$ | async) == true ? false : true" [rowsPerPageOptions]="[20, 30, 50]"
          [loading]="iSloading" [paginator]="true" [responsive]="true"
          currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [filterDelay]="0"
          (onRowSelect)="onSelect($event)" [globalFilterFields]="['name', 'createdBy']"
          styleClass="p-datatable-sm p-datatable-gridlines" [paginatorStyleClass]="'p-paginator-responsive'"
          [paginatorDropdownAppendTo]="'body'">
          <ng-template #header>
            <tr>
              <th style="width: 4rem">
                <p-tableHeaderCheckbox />
              </th>
              <th pSortableColumn="name">
                <div class="flex justify-between items-center">
                  Name
                  <p-sortIcon field="name" />
                </div>
              </th>
              <th pSortableColumn="createdBy">
                <div class="flex justify-between items-center">
                  Created By
                  <p-sortIcon field="createdBy" />
                </div>
              </th>
              <th pSortableColumn="createdOn">
                <div class="flex justify-between items-center">
                  Created Date
                  <p-sortIcon field="createdOn" />
                </div>
              </th>
              <th>
                <div class="flex justify-center items-center">Actions</div>
              </th>
            </tr>
          </ng-template>

          <ng-template #body let-data>
            <tr [pSelectableRow]="data">
              <td>
                <p-tableCheckbox [value]="data"></p-tableCheckbox>
              </td>
              <td>
                <span class="font-medium">{{ data.name }}</span>
              </td>
              <td>
                <span class="font-medium">{{ data.createdBy }}</span>
              </td>
              <td>
                {{ data.createdOn }}
              </td>
              <td>
                <div class="flex justify-center gap-2">
                  <p-button icon="pi pi-eye" severity="info" [rounded]="true" [outlined]="true" size="small"
                    (click)="openPreview(data)" title="Preview"></p-button>
                  <p-button icon="pi pi-pencil" severity="warn" [rounded]="true" [outlined]="true" size="small"
                    (click)="editFile(data)" title="Edit"></p-button>
                  <p-button icon="pi pi-download" severity="success" [rounded]="true" [outlined]="true" size="small"
                    (click)="downloadFile(data)" title="download" />
                  <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" size="small"
                    (click)="deleteFile(data)" title="delete" />
                </div>
              </td>
            </tr>
          </ng-template>

          <ng-template #emptymessage>
            <tr>
              <td colspan="5" class="text-center py-4">No Attachments found.</td>
            </tr>
          </ng-template>

          <!-- Custom paginator template -->
          <ng-template pTemplate="paginatorleft">
            <div class="hidden sm:block text-sm text-gray-600">
              <!-- Showing {{dt.first + 1}} to {{dt.first + dt.rows > dt.totalRecords ? dt.totalRecords : dt.first + dt.rows}} of {{dt.totalRecords}} entries -->
            </div>
          </ng-template>
        </p-table>
      </div>
    </div>
  </p-card>
</div>

<!-- 🔍 Image Preview Dialog -->
<p-dialog header="Image Preview" [(visible)]="previewVisible" [modal]="true" [closable]="true" [dismissableMask]="true"
  [style]="{ width: '50vw' }" [breakpoints]="{ '960px': '75vw', '640px': '90vw' }">
  <div class="flex justify-center items-center">
    <img *ngIf="previewImage" [src]="previewImage" alt="Preview"
      class="max-h-[70vh] max-w-full object-contain rounded-lg transition-opacity duration-300 ease-in-out opacity-100" />
  </div>
</p-dialog>
