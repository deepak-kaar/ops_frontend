<div class="flex flex-col gap-3 p-2 md:p-4">
    <form [formGroup]="reportForm" class="flex flex-col gap-3">
        <div class="grid grid-cols-1 md:grid-cols-1 gap-3">
            <div class="flex flex-col gap-2">
                <label for="createdBy">Name<span class="text-[var(--p-red-500)]"> *</span></label>
                <input pInputText id="name" formControlName="name" aria-describedby="username-help"
                    class="w-full" />
            </div>
        </div>
    </form>

    <!-- Existing File Info (Edit Mode Only) -->
    <div *ngIf="isEditMode && hasExistingFile()" class="bg-blue-50 border border-blue-200 rounded-lg p-4">
        <div class="flex items-start gap-3">
            <div class="flex-1">
                <div class="flex items-center gap-3 mb-3">
                    <i class="pi pi-file text-blue-600 text-xl"></i>
                    <div class="flex-1">
                        <p class="font-medium text-blue-800">Current File</p>
                        <p class="text-sm text-blue-600">{{ getExistingFileName() }}</p>
                    </div>
                </div>
                
                <!-- Image Preview -->
                <div *ngIf="hasImagePreview()" class="mb-3">
                    <img [src]="existingImagePreview" alt="Current image" 
                         class="max-w-full max-h-32 object-contain rounded border border-blue-300" />
                </div>
                
                <p class="text-xs text-blue-600">Upload a new file below to replace the current one</p>
            </div>
        </div>
    </div>

    <!-- File Upload Section - Responsive design -->
    <div class="grid grid-cols-1 gap-3">
        <p-fileUpload #fileUpload name="file" [customUpload]="true" mode="advanced" [multiple]="false"
            [showUploadButton]="false" [showCancelButton]="false" (onSelect)="onSelectFile($event)"
            (onRemove)="onRemove()" chooseLabel="Upload" chooseIcon="pi pi-upload"
            accept="image/*" styleClass="custom-fileupload w-full">
            <!-- Custom empty template -->
            <ng-template #empty>
                <div class="flex flex-col items-center justify-center py-8 text-center">
                    <i
                        class="pi pi-cloud-upload border-2 border-dashed border-gray-400 rounded-full p-8 text-4xl text-gray-400"></i>
                    <p class="mt-6 mb-0 text-gray-500 font-medium">
                        Drag & drop your file here
                    </p>
                </div>
            </ng-template>

            <!-- Custom file item template -->
            <ng-template pTemplate="file" let-file>
                <div class="flex items-center justify-between gap-4 p-2 border-b border-gray-200">
                    <!-- File Icon -->
                    <i [ngClass]="getFileIcon(file)" class="text-2xl text-gray-500"></i>

                    <!-- File Name + Size -->
                    <div class="flex flex-col flex-1 ml-2">
                        <span class="font-medium text-gray-700">{{ file.name }}</span>
                        <span class="text-sm text-gray-500">{{ formatFileSize(file.size) }}</span>
                    </div>

                    <!-- Remove Button -->
                    <p-button icon="pi pi-times" severity="danger" [rounded]="true" [outlined]="true" size="small"
                        (onClick)="removeFile(file)"></p-button>

                </div>
            </ng-template>
        </p-fileUpload>
    </div>

    <!-- Action Buttons - Stack on mobile -->
    <div class="flex flex-col sm:flex-row justify-center gap-2 sm:gap-3 mt-2">
        <p-button styleClass="w-full sm:w-44" severity="danger" outlined="true" label="Cancel" (onClick)="onCancel()"></p-button>
        <p-button styleClass="w-full sm:w-44" label="Save" (onClick)="onSave()"></p-button>
    </div>
</div>
