@if ((isMobile$ | async) == false && (isTablet$ | async) == false) {

<aside *ngIf="!hideSidebar" class="sidebar-wrapper" [class.expanded]="!sidebarCollapsed">
    <app-sidebar-new option="collapse" (collapsedChange)="onSidebarToggle($event)"></app-sidebar-new>
  </aside>
}

<!-- Mobile/Tablet Sidebar -->
<div class="fixed inset-0 z-50 lg:hidden transition-transform duration-300 ease-in-out" [ngClass]="{
               'translate-x-0': mobileSidebarVisible,
               '-translate-x-full': !mobileSidebarVisible
             }" [style.pointer-events]="mobileSidebarVisible ? 'auto' : 'none'">
    <aside class="sidebar-wrapper">
        <app-sidebar-new option="collapse" (collapsedChange)="onSidebarToggle($event)"></app-sidebar-new>
    </aside>
    <div class="fixed inset-0 z-40 lg:hidden" (click)="toggleMobileSidebar()"
        [style.pointer-events]="mobileSidebarVisible ? 'auto' : 'none'"></div>
</div>
<div class="main-content" [class.sidebar-expanded]="!sidebarCollapsed">
    <div  *ngIf="!hideSidebar" class="top-bar">
        <div class="mobile-menu lg:hidden">
            <button class="menu-btn" (click)="toggleMobileSidebar()" aria-label="Toggle sidebar">
                &#9776;
            </button>
        </div>
        <div class="search-area">
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input type="text" class="global-search" pInputText placeholder="Search" />
            </p-iconfield>
        </div>
    </div>
    <div class="content-area">
        <router-outlet></router-outlet>
    </div>
</div>
<p-toast></p-toast>
