<div class="flex flex-wrap gap-[25px]">
  <!-- First Row: Application & Organization -->
  <div class="flex flex-wrap gap-[25px]">
    <!-- Application Dropdown -->
    <p-select *ngIf="!isHideApp" [options]="apps" [(ngModel)]="selectedApp" optionLabel="appName" filterBy="appName"
      [filter]="true" placeholder="Select an Application" class="w-[300px]" showClear="true"
      (onChange)="onAppChange($event)"></p-select>

    <!-- Organization Dropdown -->
    <p-select *ngIf="!isHideOrg" [options]="orgs" [(ngModel)]="selectedOrg" optionLabel="orgName" filterBy="orgName"
      [filter]="true" placeholder="Select an Organization" class="w-[300px]" showClear="true"
      (onChange)="onOrgChange($event)"></p-select>
  </div>

  <!-- Second Row: From Date & To Date -->
  <div class="flex flex-wrap gap-[25px]">
    <!-- From Date -->
    <p-calendar [(ngModel)]="fromDate" dateFormat="dd/mm/yy" placeholder="From Date" showIcon="true" class="w-[300px]"
      (onSelect)="onDateChange()"></p-calendar>

    <!-- To Date -->
    <p-calendar [(ngModel)]="toDate" dateFormat="dd/mm/yy" placeholder="To Date" showIcon="true" class="w-[300px]"
      (onSelect)="onDateChange()"></p-calendar>
  </div>
</div>
