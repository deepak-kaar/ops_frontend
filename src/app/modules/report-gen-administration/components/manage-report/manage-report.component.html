<p-card class="w-full pb-6">
  <!-- Header Action Buttons -->
  <div class="flex justify-end pb-5">
    <p-button
      label="Save"
      type="button"
      (onClick)="saveJob()">
    </p-button>
  </div>

  <form [formGroup]="jobForm" class="flex flex-col gap-6">

    <div class="grid md:grid-cols-2 gap-4">

      <div class="flex flex-col gap-2">
        <label>Select Job *</label>
        <p-select
          formControlName="jobId"
          [options]="jobs"
          optionLabel="schedulerJobName"
          optionValue="schedulerJobId"
          [showClear]="true"
          placeholder="Select Job"
class="w-full">
        </p-select>
      </div>

      <!-- REPORT BUTTON -->
      <div class="flex flex-col gap-2">
        <label>Select Reports *</label>
        <p-button
          label="Select Reports"
          icon="pi pi-plus"
          type="button"
          (onClick)="openReportDialog()"
          class="w-full">
        </p-button>
      </div>

    </div>

    <!-- Chips to display selected Reports -->
    <div *ngIf="selectedReports.length > 0"
         class="flex flex-wrap gap-2 p-3 rounded bg-gray-50 border border-gray-200">

      <p-chip
        *ngFor="let report of selectedReports"
        [label]="report.reportName + ' (' + report.orgName + ')'"
        [removable]="true"
        (onRemove)="removeSelectedReport(report)">
      </p-chip>

    </div>

    <!-- Displaying Metadata of the selected Job -->
    @if (selectedJob) {
    <div class="pt-[20px]">
      <p-card>
        <div class="text-lg mb-4">Job Details</div>

        <div class="grid md:grid-cols-2 gap-4">

          <div class="flex flex-col gap-2">
            <label>Job Name</label>
            <input pInputText [value]="selectedJob.schedulerJobName" disabled />
          </div>

          <div class="flex flex-col gap-2">
            <label>Job Description</label>
            <input pInputText [value]="selectedJob.jobDescription" disabled />
          </div>

          <div class="flex flex-col gap-2">
            <label>Cron Expression</label>
            <input pInputText [value]="selectedJob.cronExpression" disabled />
          </div>

          <div class="flex flex-col gap-2">
            <label>Created On</label>
            <input pInputText [value]="selectedJob.createdOn | date:'medium'" disabled />
          </div>

        </div>
      </p-card>
    </div>
    }
  </form>

</p-card>

<!-- Dialog to Select Reports -->
<p-dialog
  header="Select Reports"
  [(visible)]="reportDialogVisible"
  [modal]="true"
  [style]="{ width: '85vw', height: '85vh' }"
  [contentStyle]="{ padding: '0' }">

  <div class="p-4 border-b border-gray-200 bg-gray-50">
    <app-filter></app-filter>
  </div>

  <div class="flex h-[calc(85vh-150px)]">

    <!-- Left Panel  -->
    <div class="w-1/3 flex flex-col bg-white border-r border-gray-200">

      <!-- Org Search -->
      <div class="p-3 border-b border-gray-200">
        <input
          pInputText
          placeholder="Search Organization"
          [(ngModel)]="orgSearchTerm"
          (input)="filterOrganizations()"
          class="w-full" />
      </div>

      <!-- Org List -->
      <div class="flex-1 overflow-auto p-3 space-y-2">
        <div
          (click)="selectAllOrganizations()"
          class="p-3 rounded cursor-pointer border transition"
          [ngClass]="{
            'bg-blue-50 border-blue-300': isAllSelected,
            'border-gray-200 hover:bg-gray-50': !isAllSelected
          }">

          <div class="font-medium text-sm">
            All ({{ dialogSelectedReports.length }})
          </div>

        </div>

        <!-- Organization Tabs -->
        <div
          *ngFor="let org of filteredOrganizations"
          (click)="selectOrganization(org)"
          class="p-3 rounded cursor-pointer border transition"
          [ngClass]="{
            'bg-blue-50 border-blue-300': selectedOrgForDialog?.orgId === org.orgId && !isAllSelected,
            'border-gray-200 hover:bg-gray-50': selectedOrgForDialog?.orgId !== org.orgId
          }">

          <div class="flex justify-between items-center text-sm">
            <span>{{ org.orgName }}</span>
            <span class="text-xs text-gray-500">
              ({{ getSelectedCountByOrg(org.orgId) }})
            </span>
          </div>

        </div>

      </div>

    </div>

    <!-- Right pane  -->
    <div class="w-2/3 flex flex-col bg-white">

      <!-- Report Search -->
      <div class="p-3 border-b border-gray-200">
        <input
          pInputText
          placeholder="Search Reports"
          [(ngModel)]="reportSearchTerm"
          (input)="filterReports()"
          class="w-full" />
      </div>

      <!-- Report Table -->
      <div class="flex-1 overflow-auto p-3">

        <p-table
          [value]="filteredReportsForDialog"
          [(selection)]="dialogSelectedReports"
          dataKey="reportId"
          styleClass="p-datatable-sm"
          responsiveLayout="scroll">

          <ng-template pTemplate="header">
            <tr>
              <th style="width:50px"></th>
              <th>Report Name</th>
              <th *ngIf="isAllSelected">Organization</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-report>
            <tr>
              <td>
                <p-tableCheckbox [value]="report"></p-tableCheckbox>
              </td>
              <td>{{ report.reportName }}</td>
              <td *ngIf="isAllSelected">{{ report.orgName }}</td>
            </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="3" class="text-center py-6 text-gray-500">
                No reports found.
              </td>
            </tr>
          </ng-template>

        </p-table>

      </div>

    </div>

  </div>

  <!-- Dialog Footer -->
  <ng-template pTemplate="footer">
    <div class="flex justify-between items-center w-full">

      <div class="text-sm text-gray-600">
        Selected: {{ dialogSelectedReports.length }}
      </div>

      <div>
        <p-button
          label="Cancel"
          severity="secondary"
          class="mr-2"
          type="button"
          (onClick)="reportDialogVisible=false">
        </p-button>

        <p-button
          label="Confirm"
          type="button"
          (onClick)="confirmReportSelection()">
        </p-button>
      </div>

    </div>
  </ng-template>

</p-dialog>
