<div class="flex flex-col gap-3 p-2 md:p-4">
  <form [formGroup]="datasourceForm" class="flex flex-col gap-3">
    <!-- Row 1: System Id and System Name -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div class="flex flex-col gap-2">
        <label for="sysId">System Id<span class="text-[var(--p-red-500)]"> *</span></label>
        <input pInputText id="sysId" formControlName="sysId" class="w-full" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="sysName">System Name<span class="text-[var(--p-red-500)]"> *</span></label>
        <input pInputText id="sysName" formControlName="sysName" class="w-full" />
      </div>
    </div>

    <!-- Row 2: System Type and Operating Facility -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div class="flex flex-col gap-2">
        <label for="sysType">System Type</label>
        <p-select formControlName="sysType" [options]="systemTypes" placeholder="Select System Type"
          styleClass="w-full" [filter]="true" appendTo="body" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="operatingFacility">Operating Facility</label>
        <input pInputText id="operatingFacility" formControlName="operatingFacility" class="w-full" />
      </div>
    </div>

    <!-- Row 3: System Description -->
    <div class="grid grid-cols-1 gap-3">
      <div class="flex flex-col gap-2">
        <label for="description">System Description</label>
        <textarea rows="3" cols="30" pTextarea formControlName="description" id="description"
          class="w-full"></textarea>
      </div>
    </div>

    <!-- Row 4: User JSON -->
    <div class="grid grid-cols-1 gap-3">
      <div class="flex flex-col gap-2">
        <label for="userJson">User JSON</label>
        <div class="h-[12rem]">
          <ngx-monaco-editor style="width:100%; height: 100%" [options]="editorOptions"
            formControlName="userJson"></ngx-monaco-editor>
        </div>
      </div>
    </div>
  </form>

  <!-- Action Buttons -->
  <div class="flex flex-col sm:flex-row justify-center gap-2 sm:gap-3 mt-2">
    <p-button styleClass="w-full sm:w-44" severity="danger" outlined="true" label="Cancel"
      (onClick)="cancel()"></p-button>
    <p-button styleClass="w-full sm:w-44" label="Save" (onClick)="createDataSource()"></p-button>
  </div>
</div>
