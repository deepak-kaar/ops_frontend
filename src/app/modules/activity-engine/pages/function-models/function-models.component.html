<div class="pt-[40px] pl-[20px] pr-[20px] w-full pb-[40px]">
    <p-card class="w-full">
        <div class="card">
            <p-table #dt [value]="fmData$ | async" selectionMode="single" [(selection)]="selectedCalculation"
                dataKey="functionId" [rowHover]="true" [rows]="20" [showCurrentPageReport]="true"
                [rowsPerPageOptions]="[20, 30, 50]" [loading]="loading" [paginator]="true"
                currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [filterDelay]="0"
                (onRowSelect)="onCalculationSelect($event)" (onRowUnselect)="onCalculationUnSelect($event)"
                [globalFilterFields]="['name', 'country.name', 'representative.name', 'status']">
                <ng-template #caption>
                    <div class="flex flex-col md:flex-row justify-between gap-3 mb-4">
                        <div class="flex justify-between items-center md:block">
                            <div class="font-semibold">List of Activity Function Models</div>
                            <div class="block md:hidden">
                                <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt)" />
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row md:items-center md:justify-end gap-2 w-full md:w-auto">
                            <div class="hidden md:block">
                                <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt)" />
                            </div>
                            <div class="w-full sm:w-auto">
                                <p-iconField iconPosition="left" class="w-full sm:w-auto">
                                    <p-inputIcon>
                                        <i class="pi pi-search"></i>
                                    </p-inputIcon>
                                    <input pInputText type="text" [(ngModel)]="searchValue" placeholder="Search" class="w-full" />
                                </p-iconField>
                            </div>
                            <div class="w-full sm:w-auto">
                                <p-button (onClick)="createStep()" class="w-full sm:w-auto">Create New Activity FM</p-button>
                            </div>
                        </div>
                    </div>
                </ng-template>
                <ng-template #header>
                    <tr>
                        <th pSortableColumn="calculationName" style="min-width: 14rem">
                            <div class="flex justify-between items-center">
                                Activity FM Name
                                <p-sortIcon field="calculationName" />
                            </div>
                        </th>
                        <th pSortableColumn="calculationDesc" style="min-width: 14rem">
                            <div class="flex justify-between items-center">
                                Activity FM Description
                                <p-sortIcon field="calculationDesc" />
                            </div>
                        </th>


                        <th pSortableColumn="createdOn" style="min-width: 10rem">
                            <div class="flex justify-between items-center">
                                Date
                                <p-sortIcon field="createdOn" />
                            </div>
                        </th>

                        <th style="width: 5rem">
                            <div class="flex justify-between items-center">
                                Action
                                <p-sortIcon field="date" />
                            </div>
                        </th>
                    </tr>
                </ng-template>
                <ng-template #body let-fm>
                    <tr [pSelectableRow]="fm">
                        <td>
                            {{ fm.functionName }}
                        </td>
                        <td>
                            {{ fm.functionDesc }}
                        </td>
                        <td>
                            {{ fm.createdOn | date: 'MM/dd/yyyy' }}
                        </td>
                        <td class="flex gap-[5px]">
                            <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
                                (click)="deleteApp($event,fm.functionId)" />
                        </td>
                    </tr>
                </ng-template>

                <ng-template #emptymessage>
                    <tr>
                        <td colspan="8">No Activity FM found.</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </p-card>
</div>
