<form [formGroup]="metadataForm" class="card flex flex-col">
  <div class="mb-4">
    <label for="name" class="block mb-2 font-semibold">Name <span class="text-red-500">*</span></label>
    <input 
      id="name"
      type="text" 
      pInputText 
      class="w-full"
      formControlName="name"
      placeholder="Enter sample data name" />
  </div>
  
  <div class="mb-4">
    <label for="description" class="block mb-2 font-semibold">Description</label>
    <textarea 
      id="description"
      pTextarea 
      class="w-full"
      rows="3"
      formControlName="description"
      placeholder="Enter sample data description (optional)">
    </textarea>
  </div>
  
  <div class="flex gap-2 justify-end">
    <p-button label="Cancel" severity="secondary" (onClick)="onCancel()" />
    <p-button label="Save" (onClick)="onSave()" />
  </div>
</form>
