<div class="pt-[40px] pl-[20px] pr-[20px] w-full pb-[40px]">
  <p-card class="w-full">
    <div class="card">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">
        <!-- left: search + filter -->
        <div class="flex items-center gap-2 w-full md:w-[460px] lg:w-[520px] shrink-0">
          <div class="w-full">
            <p-iconField iconPosition="left" class="w-full">
              <p-inputIcon>
                <i class="pi pi-search"></i>
              </p-inputIcon>
              <input
                pInputText
                type="text"
                [(ngModel)]="searchEmailValue"
                (input)="onGlobalFilter($event)"
                placeholder="Search"
                class="w-full" />
            </p-iconField>
          </div>
          <p-button
            [outlined]="true"
            icon="pi pi-filter-slash"
            (click)="clearEmailTable(dt)"
            class="shrink-0" />
        </div>

        <!-- right: import/export/create -->
        <div class="flex gap-2 w-full md:w-auto md:justify-end flex-wrap">
          <p-button
            (click)="triggerImport()"
            icon="pi pi-file-import"
            label="Import Excel"
            pTooltip="Import from Excel"
            class="w-full sm:w-auto"></p-button>

          <p-button
            (click)="exportExcel()"
            icon="pi pi-file-excel"
            label="Export Excel"
            pTooltip="Export to Excel"
            class="w-full sm:w-auto"></p-button>

          <p-button
            icon="pi pi-plus"
            (onClick)="createEmail()"
            label="Create"
            pTooltip="Create"
            class="w-full sm:w-auto"></p-button>
        </div>
      </div>

      <div class="table-wrapper">
        <p-table class="customizePaginator" #dt [value]="email_data$ | async" selectionMode="multiple" dataKey="_id"
          [(selection)]="selectedEmails" [rowHover]="true" [rows]="20"
          [showCurrentPageReport]="(isMobile$ | async) == true ? false : true" [rowsPerPageOptions]="[20, 30, 50]"
          [loading]="iSEmailloading" [paginator]="true" [responsive]="true"
          currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [filterDelay]="0"
          [globalFilterFields]="['from', 'to', 'emailSubject']"
          [paginatorStyleClass]="'p-paginator-responsive'" [paginatorDropdownAppendTo]="'body'">
          <ng-template pTemplate="header">
            <tr>
              <th style="width: 4rem" class="border-round-left-2xl">
                <p-tableHeaderCheckbox />
              </th>
              <th pSortableColumn="from" class="hidden sm:table-cell">
                <div class="flex justify-between items-center">
                  From
                  <p-sortIcon field="from" />
                </div>
              </th>
              <th pSortableColumn="to" class="hidden sm:table-cell">
                <div class="flex justify-between items-center">
                  To
                  <p-sortIcon field="to" />
                </div>
              </th>
              <th pSortableColumn="emailSubject" class="hidden sm:table-cell">
                <div class="flex justify-between items-center">
                  Subject
                  <p-sortIcon field="emailSubject" />
                </div>
              </th>
              <th pSortableColumn="createdAt" class="hidden sm:table-cell">
                <div class="flex justify-between items-center">
                  Created On
                  <p-sortIcon field="createdAt" />
                </div>
              </th>
              <th pSortableColumn="isActive">
                <div class="flex justify-between items-center">
                  Status
                  <p-sortIcon field="isActive" />
                </div>
              </th>
              <th class="border-round-right-2xl">
                <div class="flex justify-center items-center">Actions</div>
              </th>
            </tr>
          </ng-template>

          <ng-template #body let-data>
            <tr [pSelectableRow]="data">
              <td class="border-round-left-2xl">
                <p-tableCheckbox [value]="data"></p-tableCheckbox>
              </td>
              <td>
                <span class="font-medium">{{ data.from }}</span>
              </td>
              <td>
                <span class="font-medium">{{ data.to }}</span>
              </td>
              <td class="hidden sm:table-cell">
                {{ data.emailSubject }}
              </td>
              <td class="hidden sm:table-cell">
                {{ data.createdAt }}
              </td>
              <td>
                <p-tag [value]="getStatus(data.isActive)" [severity]="getSeverity(data.isActive)" />
              </td>
              <td class="border-round-right-2xl">
                <div class="flex justify-center gap-2">
                  <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true" size="small"
                    (click)="editEmail(data)" />
                  <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" size="small"
                    (click)="deleteEmail(data)" />
                </div>
              </td>
            </tr>
          </ng-template>

          <ng-template #emptymessage>
            <tr>
              <td colspan="7" class="text-center py-4">No Emails found.</td>
            </tr>
          </ng-template>

          <!-- Custom paginator template -->
          <ng-template pTemplate="paginatorleft">
            <div class="hidden sm:block text-sm text-gray-600">
            </div>
          </ng-template>
        </p-table>
      </div>
    </div>
  </p-card>

  @if(isShowDetails){
    <app-manage-email [mode]="mode" [emailData]="editingEmail" (emailCreated)="onEmailCreated()"></app-manage-email>
  }
</div>
