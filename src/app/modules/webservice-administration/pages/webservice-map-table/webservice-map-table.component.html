<div class="pt-[40px] pl-[20px] pr-[20px] w-full pb-[40px]">
    <p-card class="w-full">
        <div class="card">
            <div class="flex flex-col md:flex-row md:justify-between gap-3 mb-4">
                <div class="flex justify-between items-center md:block">
                    <div>List of Mappings</div>
                    <div class="flex justify-end pb-[10px] gap-[10px]">
                        <p-button (click)="exportExcel()" icon="pi pi-file-excel" label="Export Excel"
                            pTooltip="Export to Excel" class="w-full sm:w-auto"></p-button>
                    </div>
                    <div class="block md:hidden">
                        <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clearWSMapTable(dt)"
                            class="sm:w-auto" />
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row md:items-center md:justify-end gap-2 w-full md:w-auto">
                    <div class="hidden md:block">
                        <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clearWSMapTable(dt)"
                            class="sm:w-auto" />
                    </div>
                    <div class="w-full sm:w-auto">
                        <p-iconField iconPosition="left" class="w-full sm:w-auto">
                            <p-inputIcon>
                                <i class="pi pi-search"></i>
                            </p-inputIcon>
                            <input pInputText type="text" [(ngModel)]="searchWSMapValue"
                                (input)="onGlobalFilter($event)" placeholder="Search" class="w-full" />
                        </p-iconField>
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <p-table class="customizePaginator" #dt [value]="ws_map_data$ | async" selectionMode="multiple"
                    [(selection)]="selectedWSMaps" dataKey="_id" [rowHover]="true" [rows]="20"
                    [showCurrentPageReport]="(isMobile$ | async) == true ? false : true"
                    [rowsPerPageOptions]="[20,30,50]" [loading]="iSWSMaploading" [paginator]="true" [responsive]="true"
                    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [filterDelay]="0"
                    (onRowSelect)="onWSMapSelect($event)" [globalFilterFields]="['sourceField', 'targetField', 'attributeType']"
                    styleClass="p-datatable-sm p-datatable-gridlines" [paginatorStyleClass]="'p-paginator-responsive'"
                    [paginatorDropdownAppendTo]="'body'">
                    <ng-template #header>
                        <tr>
                            <th style="width: 4rem">
                                <p-tableHeaderCheckbox />
                            </th>
                            <th pSortableColumn="sourceField">
                                <div class="flex justify-between items-center">
                                    Source Field
                                    <p-sortIcon field="sourceField" />
                                </div>
                            </th>
                            <th pSortableColumn="targetField">
                                <div class="flex justify-between items-center">
                                    Target Field
                                    <p-sortIcon field="targetField" />
                                </div>
                            </th>
                            <th pSortableColumn="attributeType">
                                <div class="flex justify-between items-center">
                                    Attribute Type
                                    <p-sortIcon field="attributeType" />
                                </div>
                            </th>
                        </tr>
                    </ng-template>

                    <ng-template #body let-data>
                        <tr [pSelectableRow]="data" [class.unmapped-row]="data.isUnmapped">
                            <td>
                                <p-tableCheckbox [value]="data"></p-tableCheckbox>
                            </td>
                            <td>
                                <span class="font-medium source-field" [pTooltip]="data.sourceField" 
                                    tooltipPosition="top" [showDelay]="300">
                                    {{ getShortSourceField(data.sourceField, 40) }}
                                </span>
                            </td>
                            <td class="font-medium">
                                <span [class.text-gray-400]="data.isUnmapped" 
                                    [class.font-semibold]="!data.isUnmapped">
                                    {{ data.targetField }}
                                </span>
                            </td>
                            <td>
                                <span [class.text-gray-400]="data.isUnmapped">
                                    {{ data.attributeType }}
                                </span>
                            </td>
                        </tr>
                    </ng-template>

                    <ng-template #emptymessage>
                        <tr>
                            <td colspan="4" class="text-center py-4">No Mappings found.</td>
                        </tr>
                    </ng-template>

                    <!-- Custom paginator template -->
                    <ng-template pTemplate="paginatorleft">
                        <div class="hidden sm:block text-sm text-gray-600">
                            <!-- Showing {{dt.first + 1}} to {{dt.first + dt.rows > dt.totalRecords ? dt.totalRecords : dt.first + dt.rows}} of {{dt.totalRecords}} entries -->
                        </div>
                    </ng-template>
                </p-table>
            </div>
        </div>
    </p-card>
</div>
