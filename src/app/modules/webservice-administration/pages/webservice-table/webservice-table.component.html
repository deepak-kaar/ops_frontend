<div class="pt-[40px] pl-[20px] pr-[20px] w-full pb-[40px]">
    <div class="flex justify-end pb-[10px] gap-[10px]">
        <p-button (click)="triggerImport()" icon="pi pi-file-import" label="Import Excel" pTooltip="Import from Excel"
            severity="secondary" class="w-full sm:w-auto"></p-button>
        <p-button (click)="exportExcel()" icon="pi pi-file-excel" label="Export Excel" pTooltip="Export to Excel"
            class="w-full sm:w-auto"></p-button>
        <p-button (onClick)="createWS()" class="w-full sm:w-auto">Create</p-button>
    </div>
    <p-card class="w-full">
        <div class="card">
            <div class="flex flex-col md:flex-row md:justify-between gap-3 mb-4">
                <div class="flex justify-between items-center md:block">
                    <div>List of Web Services</div>
                    <div class="block md:hidden">
                        <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clearWSTable(dt)"
                            class="sm:w-auto" />
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row md:items-center md:justify-end gap-2 w-full md:w-auto">
                    <div class="hidden md:block">
                        <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clearWSTable(dt)"
                            class="sm:w-auto" />
                    </div>
                    <div class="w-full sm:w-auto">
                        <p-iconField iconPosition="left" class="w-full sm:w-auto">
                            <p-inputIcon>
                                <i class="pi pi-search"></i>
                            </p-inputIcon>
                            <input pInputText type="text" [(ngModel)]="searchWSValue" (input)="onGlobalFilter($event)"
                                placeholder="Search" class="w-full" />
                        </p-iconField>
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <p-table class="customizePaginator" #dt [value]="ws_data$ | async" selectionMode="multiple"
                    [(selection)]="selectedWebService" dataKey="_id" [rowHover]="true" [rows]="20"
                    [showCurrentPageReport]="(isMobile$ | async) == true ? false : true"
                    [rowsPerPageOptions]="[20,30,50]" [loading]="iSWSloading" [paginator]="true" [responsive]="true"
                    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [filterDelay]="0"
                    (onRowSelect)="onWSSelect($event)" [globalFilterFields]="['webserviceId', 'wsName', 'decription']"
                    styleClass="p-datatable-sm p-datatable-gridlines" [paginatorStyleClass]="'p-paginator-responsive'"
                    [paginatorDropdownAppendTo]="'body'">
                    <ng-template #header>
                        <tr>
                            <th style="width: 4rem">
                                <p-tableHeaderCheckbox />
                            </th>
                            <th pSortableColumn="webserviceId">
                                <div class="flex justify-between items-center">
                                    Webservice ID
                                    <p-sortIcon field="webserviceId" />
                                </div>
                            </th>
                            <th pSortableColumn="wsName">
                                <div class="flex justify-between items-center">
                                    Webservice Name
                                    <p-sortIcon field="wsName" />
                                </div>
                            </th>
                            <th pSortableColumn="description">
                                <div class="flex justify-between items-center">
                                    Description
                                    <p-sortIcon field="description" />
                                </div>
                            </th>
                            <th pSortableColumn="active">
                                <div class="flex justify-between items-center">
                                    Status
                                    <p-sortIcon field="active" />
                                </div>
                            </th>
                            <th>
                                <div class="flex justify-center items-center">Actions</div>
                            </th>
                        </tr>
                    </ng-template>

                    <ng-template #body let-data>
                        <tr [pSelectableRow]="data">
                            <td>
                                <p-tableCheckbox [value]="data"></p-tableCheckbox>
                            </td>
                            <td>
                                <span class="font-medium">{{ data.webserviceId }}</span>
                            </td>
                            <td class="font-medium">
                                {{ data.wsName }}
                            </td>
                            <td>
                                <span>{{ data.description }}</span>
                            </td>
                            <td>
                                <p-tag [value]="getStatus(data.active)" [severity]="getSeverity(data.active)" />
                            </td>
                            <td>
                                <div class="flex justify-center gap-2">
                                    <p-button icon="pi pi-cloud-download" severity="success" [rounded]="true"
                                        [outlined]="true" size="small" (click)="runWS(data)" title="fetch" />
                                    <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true" size="small"
                                        (click)="editWS(data)" title="edit" />
                                    <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
                                        size="small" (click)="deleteWS(data)" title="delete" />
                                </div>
                            </td>
                        </tr>
                    </ng-template>

                    <ng-template #emptymessage>
                        <tr>
                            <td colspan="6" class="text-center py-4">No Web Service found.</td>
                        </tr>
                    </ng-template>

                    <!-- Custom paginator template -->
                    <ng-template pTemplate="paginatorleft">
                        <div class="hidden sm:block text-sm text-gray-600">
                            <!-- Showing {{dt.first + 1}} to {{dt.first + dt.rows > dt.totalRecords ? dt.totalRecords : dt.first + dt.rows}} of {{dt.totalRecords}} entries -->
                        </div>
                    </ng-template>
                </p-table>
            </div>
        </div>
    </p-card>

    @if(isShowMappingTable){
    <app-webservice-map-table [wsData]="activeWS"></app-webservice-map-table>
    }
</div>
