@if ((isMobile$ | async) == false && (isTablet$ | async) == false) {
<div><app-sidebar></app-sidebar></div>
}

<!-- Mobile/Tablet Sidebar -->
<div class="fixed inset-0 z-50 lg:hidden transition-transform duration-300 ease-in-out" [ngClass]="{
       'translate-x-0': mobileSidebarVisible,
       '-translate-x-full': !mobileSidebarVisible
     }" [style.pointer-events]="mobileSidebarVisible ? 'auto' : 'none'">
    <div class="absolute w-[300px] h-full bg-white shadow-lg z-50">
        <app-sidebar></app-sidebar>
    </div>
    <div class="fixed inset-0 z-40 lg:hidden" (click)="toggleMobileSidebar()"
        [style.pointer-events]="mobileSidebarVisible ? 'auto' : 'none'"></div>
</div>

<!-- Main Layout -->
<div class="pl-[0] lg:pl-[300px] h-screen flex flex-col">
    <!-- Header -->
    <div class="box-shadow w-full flex justify-between items-center h-[60px] flex-shrink-0">
        <div class="p-2 flex justify-center lg:hidden">
            <button class="block text-3xl" (click)="toggleMobileSidebar()" aria-label="Toggle sidebar">
                &#9776;
            </button>
        </div>
        <div class="p-2 flex items-center gap-4">
            <div class="flex items-center gap-2">
                <label class="text-sm font-medium">Rollout Label:</label>
                <p-select 
                    [options]="labels" 
                    [(ngModel)]="selectedLabel" 
                    placeholder="Select Label"
                    (onChange)="onLabelChange()"
                    styleClass="w-[200px]">
                </p-select>
            </div>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input type="text" class="global-search" pInputText placeholder="Search" />
            </p-iconfield>
        </div>
    </div>

    <!-- Scrollable Content Area -->
    <div class="flex-1 overflow-y-auto">
        <div class="pt-[50px] px-[20px]">
            <app-filter></app-filter>
        </div>
        <router-outlet></router-outlet>
    </div>
</div>
<p-toast></p-toast>
