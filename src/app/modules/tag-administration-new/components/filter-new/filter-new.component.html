<div class="flex flex-wrap gap-[25px]">
  <!-- Application Dropdown -->
  <p-select *ngIf="!isHideApp" [options]="apps" [(ngModel)]="selectedApp" optionLabel="appName" filterBy="appName"
    (onChange)="onAppChange($event)" [filter]="true" placeholder="Select an Application" class="w-[300px]"
    showClear="true"></p-select>

  <!-- Organization Dropdown -->
  <p-select *ngIf="!isHideOrg" [options]="orgs" [(ngModel)]="selectedOrg" optionLabel="orgName" filterBy="orgName"
    [filter]="true" placeholder="Select an Organization" class="w-[300px]" showClear="true"
    (onChange)="onOrgChange($event)"></p-select>

  <!-- Entity or Instance Dropdown -->
  <p-select [options]="type" [(ngModel)]="selectedType" placeholder="Select Entity or Instance" class="w-[300px]"
     showClear="true" (onChange)="onTypeChange()"></p-select>

  <!-- Entity or Instance ID Dropdown -->
  <p-select [options]="listOptions" optionLabel="name" optionValue="id" [(ngModel)]="selectedId" [filter]="true"
    filterBy="name" placeholder="Type & select Entity/Instance ID" class="w-[300px]" showClear="true"
    (onFilter)="onIdFilter($event)" (onChange)="onTypeNameChange()"></p-select>

  <!-- Attribute Dropdown -->
  <p-select [options]="attributesOptions" optionLabel="name" optionValue="id" [(ngModel)]="selectedAttribute"
    [filter]="true" placeholder="Select Attribute" class="w-[300px]" showClear="true"
    (onChange)="onAttributeChange($event)"></p-select>
</div>
