<div class="pt-[40px] pl-[20px] pr-[20px] w-full pb-[40px]">
  <p-card class="w-full">
    <div class="card">
      <div class="flex flex-col md:flex-row justify-between gap-3 mb-4">
        <div class="flex justify-between items-center md:block">
          <div class="section-title">List of Correlation templates</div>
          <div class="block md:hidden">
            <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt)" class="sm:w-auto" />
          </div>
        </div>
        <div class="flex flex-col sm:flex-row md:items-center md:justify-end gap-2 w-full md:w-auto">
          <div class="hidden md:block">
            <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clear(dt)" class="sm:w-auto" />
          </div>
          <div class="w-full sm:w-auto">
            <p-iconField iconPosition="left" class="w-full sm:w-auto">
              <p-inputIcon>
                <i class="pi pi-search"></i>
              </p-inputIcon>
              <input pInputText type="text" (keyup)="applyFilterGlobal($event, 'contains')" [(ngModel)]="searchValue"
                placeholder="Search" class="w-full" />
            </p-iconField>
          </div>
          <div class="w-full sm:w-auto">
            <p-button (onClick)="createApp()" class="w-full sm:w-auto">Create New Correlation</p-button>
          </div>
        </div>
      </div>

      <div class="table-wrapper">
        <p-table class="customizePaginator" #dt [value]="correlationData" selectionMode="single"
          [(selection)]="selectedCorrelation" dataKey="correlationId" [rowHover]="true" [rows]="20"
          [showCurrentPageReport]="true" [rowsPerPageOptions]="[20, 30, 50]" [loading]="loading"
          [paginator]="true" [responsive]="true"
          currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [filterDelay]="0"
          (onRowSelect)="onCorrelationSelect($event)" (onRowUnselect)="onCorrelationUnSelect($event)"
          [globalFilterFields]="['correlationName', 'correlationDesc', 'correlationStatus']"
          styleClass="p-datatable-sm p-datatable-gridlines" [paginatorStyleClass]="'p-paginator-responsive'"
          [paginatorDropdownAppendTo]="'body'">
          <ng-template #header>
            <tr>
              <th pSortableColumn="correlationName">
                <div class="flex justify-between items-center">
                  Correlation Template Name
                  <p-sortIcon field="correlationName" />
                </div>
              </th>
              <th pSortableColumn="correlationDesc">
                <div class="flex justify-between items-center">
                  Template Description
                  <p-sortIcon field="correlationDesc" />
                </div>
              </th>
              <th pSortableColumn="correlationStatus">
                <div class="flex justify-between items-center">
                  Status
                  <p-sortIcon field="correlationStatus" />
                </div>
              </th>
              <th pSortableColumn="createdOn">
                <div class="flex justify-between items-center">
                  Date
                  <p-sortIcon field="createdOn" />
                </div>
              </th>
              <th>
                <div class="flex justify-between items-center">
                  Action
                </div>
              </th>
            </tr>
          </ng-template>
          <ng-template #body let-cor>
            <tr [pSelectableRow]="cor">
              <td>{{ cor.correlationName }}</td>
              <td>{{ cor.correlationDesc }}</td>
              <td>
                <p-tag [value]="getStatus(cor.correlationStatus)" [severity]="getSeverity(cor.correlationStatus)" />
              </td>
              <td>{{ cor.createdOn | date: 'MM/dd/yyyy' }}</td>
              <td class="flex gap-[5px]">
                <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
                  (click)="deleteApp($event, cor.correlationId)" />
              </td>
            </tr>
          </ng-template>
          <ng-template #emptymessage>
            <tr>
              <td colspan="5">No Correlation Templates found.</td>
            </tr>
          </ng-template>
          <ng-template pTemplate="paginatorleft">
            <div class="hidden sm:block text-sm text-gray-600"></div>
          </ng-template>
        </p-table>
      </div>
    </div>
  </p-card>
</div>
<p-confirmdialog></p-confirmdialog>
<p-toast [breakpoints]="breakPointForToastComponent"></p-toast>
