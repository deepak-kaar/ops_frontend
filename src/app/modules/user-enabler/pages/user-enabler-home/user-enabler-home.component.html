<div class="layout-root surface">
  <div class="mobile-overlay" [class.active]="mobileSidebarVisible" (click)="toggleMobileSidebar()"></div>
  <aside class="sidebar-wrapper" [class.mobile-open]="mobileSidebarVisible">
    <app-sidebar-new></app-sidebar-new>
  </aside>

  <div class="right-pane surface-ground">
    <app-topbar-new
      (menuToggle)="toggleMobileSidebar()"
      [showRolloutLabel]="true"
      [labels]="labels"
      [(selectedLabel)]="selectedLabel"
      (labelChange)="onLabelChange()">
    </app-topbar-new>
    <div class="right-scroll">

      <!-- Filter Section -->
      <div class="pt-[50px] px-[20px]">
        <app-filter></app-filter>
      </div>

      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<p-toast></p-toast>
