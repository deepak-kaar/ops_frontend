<div class="pt-[40px] pl-[20px] pr-[20px] w-full pb-[40px]">
    <div class="flex justify-end pb-[10px] gap-[10px]">
        <p-button icon="pi pi-plus" (onClick)="create()" label="Create"></p-button>
    </div>
    <p-card class="w-full">
        <div class="card">
            <div class="flex flex-col md:flex-row md:justify-between gap-3 mb-4">
                <div class="flex justify-between items-center md:block">
                    <div>List of Enabled Accounts</div>
                    <div class="block md:hidden">
                        <p-button [outlined]="true" icon="pi pi-filter-slash" (onClick)="clearTable(dt)"
                            class="sm:w-auto" />
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row md:items-center md:justify-end gap-2 w-full md:w-auto">
                    <div class="hidden md:block">
                        <p-button [outlined]="true" icon="pi pi-filter-slash" (onClick)="clearTable(dt)"
                            class="sm:w-auto" />
                    </div>
                    <div class="w-full sm:w-auto">
                        <p-iconField iconPosition="left" class="w-full sm:w-auto">
                            <p-inputIcon>
                                <i class="pi pi-search"></i>
                            </p-inputIcon>
                            <input pInputText type="text" [(ngModel)]="searchValue" placeholder="Search"
                                class="w-full" />
                        </p-iconField>
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <p-table class="customizePaginator" #dt [value]="accEnabler_data$ | async" selectionMode="single"
                    [(selection)]="selectedData" dataKey="_id" [rowHover]="true" [rows]="20"
                    [showCurrentPageReport]="(isMobile$ | async) == true ? false : true"
                    [rowsPerPageOptions]="[20,30,50]" [loading]="iSloading" [paginator]="true"
                    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
                    [filterDelay]="0" (onRowSelect)="onSelect($event)" [globalFilterFields]="['isActive']"
                    styleClass="p-datatable-sm">
                    <ng-template pTemplate="header">
                        <tr>
                            <th pSortableColumn="user" class="border-round-left-2xl">
                                <div class="flex justify-between items-center">
                                    User
                                    <p-sortIcon field="user" />
                                </div>
                            </th>
                            <th pSortableColumn="role" class="hidden sm:table-cell">
                                <div class="flex justify-between items-center">
                                    Role
                                    <p-sortIcon field="role" />
                                </div>
                            </th>
                            <th pSortableColumn="duration" class="hidden sm:table-cell">
                                <div class="flex justify-between items-center">
                                    Duration
                                    <p-sortIcon field="duration" />
                                </div>
                            </th>
                            <th pSortableColumn="incident" class="hidden sm:table-cell">
                                <div class="flex justify-between items-center">
                                    Incident Number
                                    <p-sortIcon field="incident" />
                                </div>
                            </th>
                            <th pSortableColumn="justification">
                                <div class="flex justify-between items-center">
                                    Justification
                                    <p-sortIcon field="justification" />
                                </div>
                            </th>
                            <th pSortableColumn="isActive">
                                <div class="flex justify-between items-center">
                                    Status
                                    <p-sortIcon field="isActive" />
                                    <p-columnFilter field="isActive" matchMode="equals" display="menu"
                                        [showMatchModes]="false" [showOperator]="false" [showAddButton]="false"
                                        [showApplyButton]="false">
                                        <ng-template pTemplate="filter" let-value let-filter="filterCallback">
                                            <p-select [ngModel]="value" [options]="statuses" optionLabel="label"
                                                optionValue="value" (onChange)="filter($event.value)"
                                                placeholder="Any"></p-select>
                                        </ng-template>
                                    </p-columnFilter>
                                </div>
                            </th>
                            <th class="border-round-right-2xl">
                                <div class="flex justify-center items-center">Actions</div>
                            </th>
                        </tr>
                    </ng-template>

                    <ng-template #body let-data>
                        <tr [pSelectableRow]="data">
                            <td>
                                <span class="font-bold">{{ data.user ?? 'SHAKAX0A' }}</span>
                            </td>
                            <td>
                                <span class="font-bold">{{ data.role }}</span>
                            </td>
                            <td>
                                <span class="font-bold">{{ data.duration }} hr</span>
                            </td>
                            <td class="hidden sm:table-cell">
                                {{ data.incident }}
                            </td>
                            <td class="hidden sm:table-cell">
                                {{ data.justification }}
                            </td>
                            <td class="hidden sm:table-cell">
                                <p-tag [value]="getStatus(data.isActive)" [severity]="getSeverity(data.isActive)" />
                            </td>
                            <td>
                                <div class="flex justify-center gap-2">
                                    <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true"
                                        [size]="(isMobile$ | async) ? 'small' : 'large'" (onClick)="editData(data)"
                                        title="edit" />
                                </div>
                            </td>
                        </tr>
                    </ng-template>

                    <ng-template #emptymessage>
                        <tr>
                            <td colspan="7" class="text-center py-4">No Records found.</td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        </div>
    </p-card>
</div>
