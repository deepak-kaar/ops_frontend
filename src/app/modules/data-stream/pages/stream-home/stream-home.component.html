<div class="scan-container px-6 pt-4 pb-6">
  <div class="flex flex-col md:flex-row justify-between gap-3 mb-4">
    <div class="section-title">
      <i class="pi pi-video mr-2"></i>Start Stream
    </div>
  </div>

  <p-card class="w-full scan-card">
    <div class="flex flex-col gap-4">
      <div class="flex flex-col items-center gap-4">
        <video #localVideo autoplay playsinline muted class="video"></video>

        <div class="flex pt-4 gap-2 controls">
          <button (click)="startStream()" class="btn btn-success">Start Stream</button>
          <button (click)="stopStream()" class="btn btn-danger">Stop Stream</button>
        </div>
      </div>
    </div>
  </p-card>
</div>
