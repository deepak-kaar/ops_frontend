<div class="pt-[40px] pl-[20px] pr-[20px] w-full">
  <div class="flex justify-end pb-[10px] gap-[10px]">
    <p-button (click)="triggerImport()" icon="pi pi-file-import" label="Import Excel" pTooltip="Import from Excel"
      severity="secondary" class="w-full sm:w-auto"></p-button>
    <p-button (click)="exportExcel()" icon="pi pi-file-excel" label="Export Excel" pTooltip="Export to Excel"
      class="w-full sm:w-auto"></p-button>
    <p-button (onClick)="createJob()">Create</p-button>
  </div>
  <p-card class="w-full">
    <div class="card">
      <div class="flex flex-col md:flex-row md:justify-between gap-3 mb-4">
        <div class="flex justify-between items-center md:block">
          <div>List of Scheduled Jobs</div>
          <div class="block md:hidden">
            <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clearSchedulingTable(dt)"
              class="sm:w-auto" />
          </div>
        </div>

        <div class="flex flex-col sm:flex-row md:items-center md:justify-end gap-2 w-full md:w-auto">
          <div class="hidden md:block">
            <p-button [outlined]="true" icon="pi pi-filter-slash" (click)="clearSchedulingTable(dt)"
              class="sm:w-auto" />
          </div>
          <div class="w-full sm:w-auto">
            <p-iconField iconPosition="left" class="w-full sm:w-auto">
              <p-inputIcon>
                <i class="pi pi-search"></i>
              </p-inputIcon>
              <input pInputText type="text" [(ngModel)]="searchJobValue" (input)="onGlobalFilter($event)"
                placeholder="Search" class="w-full" />
            </p-iconField>
          </div>
        </div>
      </div>

      <div class="table-wrapper">
        <p-table class="customizePaginator" #dt [value]="scheduling_data$ | async" selectionMode="multiple"
          [(selection)]="selectedJobs" dataKey="_id" [rowHover]="true" [rows]="20"
          [showCurrentPageReport]="(isMobile$ | async) == true ? false : true" [rowsPerPageOptions]="[20, 30, 50]"
          [loading]="iSloading" [paginator]="true" [responsive]="true"
          currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [filterDelay]="0"
          (onRowSelect)="onJobSelect($event)"
          [globalFilterFields]="['schedulerJobName', 'jobDescription', 'triggerName']"
          styleClass="p-datatable-sm p-datatable-gridlines" [paginatorStyleClass]="'p-paginator-responsive'"
          [paginatorDropdownAppendTo]="'body'">
          <ng-template #header>
            <tr>
              <th style="width: 4rem">
                <p-tableHeaderCheckbox />
              </th>
              <th pSortableColumn="schedulerJobName">
                <div class="flex justify-between items-center">
                  Job Name
                  <p-sortIcon field="schedulerJobName" />
                </div>
              </th>
              <th pSortableColumn="jobDescription">
                <div class="flex justify-between items-center">
                  Job Description
                  <p-sortIcon field="jobDescription" />
                </div>
              </th>
              <th pSortableColumn="schedulerLevel">
                <div class="flex justify-between items-center">
                  Level
                  <p-sortIcon field="schedulerLevel" />
                  <p-columnFilter field="schedulerLevel" matchMode="equals" display="menu" [showMatchModes]="false"
                    [showOperator]="false" [showAddButton]="false" [showApplyButton]="false">
                    <ng-template pTemplate="filter" let-value let-filter="filterCallback">
                      <p-select [ngModel]="value" [options]="statuses" (onChange)="filter($event.value)"
                        placeholder="Any"></p-select>
                    </ng-template>
                  </p-columnFilter>

                </div>
              </th>
              <th pSortableColumn="triggerName">
                <div class="flex justify-between items-center">
                  Cron Expression
                  <p-sortIcon field="triggerName" />
                </div>
              </th>
              <th pSortableColumn="inScheduled">
                <div class="flex justify-between items-center">
                  Is Scheduled
                  <p-sortIcon field="inScheduled" />
                </div>
              </th>
              <th>
                <div class="flex justify-center items-center">Actions</div>
              </th>
            </tr>
          </ng-template>

          <ng-template #body let-data>
            <tr [pSelectableRow]="data">
              <td>
                <p-tableCheckbox [value]="data"></p-tableCheckbox>
              </td>
              <td>
                <span class="font-medium">{{ data.schedulerJobName }}</span>
              </td>
              <td>
                {{ data.jobDescription }}
              </td>
              <td>
                <span class="level-chip">
                  {{
                  data.schedulerLevel
                  }}
                </span>
              </td>
              <td>
                {{ data.cronExpression}}
              </td>
              <td>
                {{ data.inScheduled ? 'Yes' : 'No' }}
              </td>
              <td>
                <div class="flex justify-center gap-2">
                  <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true" title="success" size="small"
                    (click)="editJob(data)" />
                  <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" title="delete"
                    size="small" (click)="deleteJob(data)" />
                </div>
              </td>
            </tr>
          </ng-template>

          <ng-template #emptymessage>
            <tr>
              <td colspan="6" class="text-center py-4">No Jobs found.</td>
            </tr>
          </ng-template>

          <!-- Custom paginator template -->
          <ng-template pTemplate="paginatorleft">
            <div class="hidden sm:block text-sm text-gray-600">
              <!-- Showing {{dt.first + 1}} to {{dt.first + dt.rows > dt.totalRecords ? dt.totalRecords : dt.first + dt.rows}} of {{dt.totalRecords}} entries -->
            </div>
          </ng-template>
        </p-table>
      </div>
    </div>
  </p-card>
</div>
