<div class="oil-container">

  <!-- Header -->
  <div class="header">
    <div>
      <h2>Oil Production</h2>
      <p class="subtitle">Monthly field performance</p>
    </div>
    <div class="menu">⋮</div>
  </div>

  <!-- Table Header -->
  <div class="table header-row">
    <div>FIELD</div>
    <div>ENGINEERS</div>
    <div>PRODUCTION</div>
    <div>COMPLETION</div>
  </div>

  <!-- Row -->
  <div class="table row">
    <div class="field">
      <span class="icon">🛢️</span>
      North Basin
    </div>

    <div class="members">
      <span class="avatar">AR</span>
      <span class="avatar">MK</span>
      <span class="avatar">SJ</span>
    </div>

    <div class="budget">
      45,000 bbl/day
    </div>

    <div class="progress">
      <span>60%</span>
      <div class="bar">
        <div class="fill" style="width:60%"></div>
      </div>
    </div>
  </div>

  <!-- Row -->
  <div class="table row">
    <div class="field">
      <span class="icon">🛢️</span>
      East Offshore
    </div>

    <div class="members">
      <span class="avatar">KP</span>
      <span class="avatar">RN</span>
    </div>

    <div class="budget">
      12,000 bbl/day
    </div>

    <div class="progress">
      <span>25%</span>
      <div class="bar">
        <div class="fill" style="width:25%"></div>
      </div>
    </div>
  </div>

  <!-- Row -->
  <div class="table row">
    <div class="field">
      <span class="icon">🛢️</span>
      South Onshore
    </div>

    <div class="members">
      <span class="avatar">VT</span>
      <span class="avatar">NS</span>
      <span class="avatar">AK</span>
    </div>

    <div class="budget">
      78,000 bbl/day
    </div>

    <div class="progress">
      <span>100%</span>
      <div class="bar">
        <div class="fill" style="width:100%"></div>
      </div>
    </div>
  </div>

</div>
