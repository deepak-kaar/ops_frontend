<div class="pt-[20px] pl-[20px] pr-[20px] w-full pb-[40px] roles-page">
    <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 mb-4">
        @for(card of cardList; track card; let idx = $index){
        <p-card [styleClass]="'home-card ' + (activeCardIndex === idx ? 'active' : '')" (click)="change(idx)">
            <div class="flex items-center gap-2">
                <div class="icon-box" [innerHTML]="sanitizer.bypassSecurityTrustHtml(card.svg)"></div>
                <div class="flex flex-col flex-1 min-w-0">
                    <span class="title">{{card.name}}</span>
                </div>
            </div>
        </p-card>
        }
    </div>

    <p-card class="w-full roles-table-card">
        <div class="card">
            <div class="roles-toolbar">
                <div class="roles-search">
                    <p-iconField iconPosition="left" class="search-field">
                        <p-inputIcon>
                            <i class="pi pi-search"></i>
                        </p-inputIcon>
                        <input pInputText type="text" [(ngModel)]="searchValue" (input)="onGlobalFilter(dt, $event)"
                            placeholder="Search roles..." class="w-full" />
                    </p-iconField>
                    <p-button label="Filter" icon="pi pi-filter" [outlined]="true" class="btn-filter"
                        (onClick)="clear(dt)"></p-button>
                </div>

                <div class="roles-actions">
                    <p-button icon="pi pi-plus" (onClick)="createRole()" label="Create" class="btn-primary"></p-button>
                </div>
            </div>

            <div class="table-wrapper">
                <p-table #dt class="customizePaginator" [value]="roles" selectionMode="single"
                    [(selection)]="selectedRole" dataKey="roleId" [rowHover]="true" [rows]="20"
                    [showCurrentPageReport]="(isMobile$ | async) == true ? false : true"
                    [rowsPerPageOptions]="[20, 30, 50]" [loading]="loading" [paginator]="true"
                    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
                    [filterDelay]="0" (onRowSelect)="onRoleSelect($event)"
                    (onRowUnselect)="onRoleUnSelect()"
                    [globalFilterFields]="['roleName','roleDescription','createdOn']"
                    styleClass="p-datatable-sm">

                    <ng-template #header>
                        <tr>
                            <th pSortableColumn="roleName" class="border-round-left-2xl">
                                <div class="flex justify-between items-center">
                                    Role Name
                                    <p-sortIcon field="roleName" />
                                </div>
                            </th>
                            <th pSortableColumn="roleDescription" class="hidden sm:table-cell">
                                <div class="flex justify-between items-center">
                                    Description
                                    <p-sortIcon field="roleDescription" />
                                </div>
                            </th>
                            <th pSortableColumn="createdOn" class="hidden md:table-cell">
                                <div class="flex justify-between items-center">
                                    Date
                                    <p-sortIcon field="createdOn" />
                                </div>
                            </th>
                            <th class="border-round-right-2xl">
                                <div class="flex justify-center items-center">
                                    Actions
                                </div>
                            </th>
                        </tr>
                    </ng-template>

                    <ng-template #body let-role>
                        <tr [pSelectableRow]="role">
                            <td>
                                <span class="font-medium">{{ role.roleName }}</span>
                                <div class="block sm:hidden text-xs text-gray-500 mt-1">
                                    {{ role.roleDescription }}
                                </div>
                                <div class="block md:hidden text-xs text-gray-500 mt-1">
                                    {{ role.createdOn | date: 'MM/dd/yyyy' }}
                                </div>
                            </td>
                            <td class="hidden sm:table-cell">
                                {{ role.roleDescription }}
                            </td>
                            <td class="hidden md:table-cell">
                                {{ role.createdOn | date: 'MM/dd/yyyy' }}
                            </td>
                            <td>
                                <div class="flex justify-center gap-2">
                                    <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true"
                                        [size]="(isMobile$ | async) ? 'small' : 'large'"
                                        (onClick)="editRole(role)" />
                                    <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"
                                        [size]="(isMobile$ | async) ? 'small' : 'large'"
                                        (onClick)="deleteRole(role.roleId)" />
                                </div>
                            </td>
                        </tr>
                    </ng-template>

                    <ng-template #emptymessage>
                        <tr>
                            <td colspan="4" class="text-center py-4">No roles found.</td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        </div>
    </p-card>
</div>
<p-toast [breakpoints]="breakPointForToastComponent"></p-toast>
