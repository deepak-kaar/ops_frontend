
<p-card class="w-full">
    <div class="card">
        <p-table #dt [value]="shifts" selectionMode="single" [(selection)]="selectedShift" dataKey="shiftId"
            [rowHover]="true" [rows]="20" [showCurrentPageReport]="(isMobile$|async)==false" [rowsPerPageOptions]="[20, 30, 50]"
            [loading]="loading" [paginator]="true"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [filterDelay]="0"
            (onRowSelect)="onShiftSelect($event)"
            [globalFilterFields]="['shiftName', 'shiftDescription', 'hourFormat']"
            class="customizePaginator">
            <ng-template #caption>
                @if ((isMobile$|async)==true){
                    <div class="flex flex-col gap-[10px]">
                        <div class="flex w-full items-center gap-[10px]">
                            <p-iconField iconPosition="left" class="w-full">
                                <p-inputIcon>
                                    <i class="pi pi-search"></i>
                                </p-inputIcon>
                                <input pInputText type="text" [(ngModel)]="searchValue"
                                    (input)="onGlobalFilter(dt, $event)" placeholder="Search" class="w-full" />
                            </p-iconField>
                            <p-button [outlined]="true" icon="pi pi-filter-slash" (onClick)="clear(dt)" />
                        </div>
                        <div class="flex justify-end">
                            <p-button icon="pi pi-plus" label="Create New Shift" (onClick)="createShift()"></p-button>
                        </div>
                    </div>
                }
                @else{
                    <div class="flex justify-between items-center gap-[10px] flex-nowrap">
                        <div class="flex gap-[10px] items-center flex-1 min-w-0">
                            <p-iconField iconPosition="left" class="w-full">
                                <p-inputIcon>
                                    <i class="pi pi-search"></i>
                                </p-inputIcon>
                                <input pInputText type="text" [(ngModel)]="searchValue"
                                    (input)="onGlobalFilter(dt, $event)" placeholder="Search" class="w-full" />
                            </p-iconField>
                            <p-button [outlined]="true" icon="pi pi-filter-slash" (onClick)="clear(dt)" />
                        </div>

                        <div class="flex gap-[10px] items-center shrink-0">
                            <p-button icon="pi pi-file-import" label="Import" pTooltip="Import" styleClass="toolbar-btn"></p-button>
                            <p-button icon="pi pi-upload" label="Export" pTooltip="Export" styleClass="toolbar-btn"></p-button>
                            <p-button icon="pi pi-plus" label="Create New Shift" (onClick)="createShift()"></p-button>
                        </div>
                    </div>
                }
            </ng-template>
            <ng-template #header>
                <tr>
                    <th pSortableColumn="templateName" style="min-width: 14rem">
                        <div class="flex justify-between items-center">
                            Shift Name
                            <p-sortIcon field="templateName" />
                            <!-- <p-columnFilter type="text" field="name" display="menu" class="ml-auto" /> -->
                        </div>
                    </th>
                    <th pSortableColumn="templateDescription" style="min-width: 14rem">
                        <div class="flex justify-between items-center">
                            Description
                            <p-sortIcon field="templateDescription" />
                            <!-- <p-columnFilter type="text" field="country.name" display="menu" class="ml-auto" /> -->
                        </div>
                    </th>

                    <th pSortableColumn="hourFormat" style="min-width: 10rem">
                        <div class="flex justify-between items-center">
                            Interval
                            <p-sortIcon field="createdOn" />
                        </div>
                    </th>
                    <th style="width: 5rem">
                        <div class="flex justify-between items-center">
                            Action
                            <p-sortIcon field="date" />
                            <!-- <p-columnFilter type="date" field="date" display="menu" class="ml-auto" /> -->
                        </div>
                    </th>
                </tr>
            </ng-template>
            <ng-template #body let-shift>
                <tr [pSelectableRow]="shift">
                    <td>
                        {{ shift.shiftName }}
                    </td>
                    <td>
                        {{ shift.shiftDescription }}
                    </td>
                    <td>
                        {{ shift.hourFormat }}
                    </td>
                    <td class="flex gap-[5px]">
                        <p-button icon="pi pi-pencil" [rounded]="true" [outlined]="true" (click)="editShift(shift)" />
                        <p-button (click)="deleteShift($event,shift.shiftId)" icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"/>
                    </td>
                </tr>
            </ng-template>
            <ng-template #emptymessage>
                <tr>
                    <td colspan="8">No Shifts found.</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</p-card>
<p-confirmdialog />
<p-toast [breakpoints]="breakPointForToastComponent"></p-toast>
